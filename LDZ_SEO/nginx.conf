server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # --- Cache static assets aggressively (JS/CSS have hashed filenames) ---
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|mp4|webm|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # --- HTML: never cache (SSR / SPA re-entry point) ---
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- SPA fallback (no-cache so fresh HTML is always fetched) ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
