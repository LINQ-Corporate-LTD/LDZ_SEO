name: 🚀 Auto Deploy to Hetzner

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: 87.99.135.169
        username: root
        key: ${{ secrets.HETZNER_SSH_KEY }}
        timeout: 600s
        script: |
          cd /var/www/projects/ldz-seo
          ./deploy.sh
